name: Playwright Tests & Allure Report
on:
  push:
    branches:
      - "**"
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
 
permissions:
  contents: write
  pages: write
  id-token: write
 
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard_index: [1, 2, 3]
    env:
      CI: true
 
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
 
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: lts/*
        cache: npm
 
    - name: Install Dependencies
      run: npm ci
 
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
 
    - name: Run Playwright Tests
      run: npm run test:ci -- --shard=${{ matrix.shard_index }}/3
      continue-on-error: true
 
    - name: Upload Allure Raw Results (Shard)
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: allure-results-shard-${{ matrix.shard_index }}
        path: allure-results
        if-no-files-found: warn
        retention-days: 14
 
  report:
    if: ${{ always() }}
    needs: [test]
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
 
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: lts/*
        cache: npm
 
    - name: Install Dependencies
      run: npm ci
 
    - name: Clean Allure Results Directory
      run: rm -rf allure-results allure-report
 
    - name: Download Allure Raw Results
      uses: actions/download-artifact@v4
      with:
        pattern: allure-results-shard-*
        merge-multiple: true
        path: allure-results
 
    - name: Check Allure Results
      run: |
        if [ -d allure-results ]; then
          echo "Files in allure-results:"
          find allure-results -type f | head -20
          echo "Total files: $(find allure-results -type f | wc -l)"
        else
          echo "No allure-results directory found!"
        fi
 
    - name: Generate Allure Report
      run: npm run allure:generate -- --clean
      continue-on-error: true
 
    - name: Verify Allure Report
      run: |
        if [ -d allure-report ]; then
          echo "Allure report generated successfully"
          ls -la allure-report/
        else
          echo "Warning: No allure-report directory created"
        fi
 
    - name: Upload Allure HTML Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: allure-report
        path: allure-report
        if-no-files-found: warn
        retention-days: 14
 
    - name: Deploy to GitHub Pages
      if: always() && github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'master')
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_branch: gh-pages
        publish_dir: allure-report
      continue-on-error: true